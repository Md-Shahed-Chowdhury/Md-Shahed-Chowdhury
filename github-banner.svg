    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.6s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1;0" dur="1.5s" begin="2.6s" fill="freeze"/>
  </rect>

  <!-- Tagline with typing animation -->
  <text x="85" y="275" font-family="'Fira Code','JetBrains Mono',monospace" font-size="13" fill="#a5b4fc" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="3s" fill="freeze"/>
    &gt;
  </text>
  <g clip-path="url(#tagClip)">
    <text x="100" y="275" font-family="'Fira Code','JetBrains Mono',monospace" font-size="13" fill="#c4b5fd">🚀 Frontend Developer | IoT Enthusiast | Aspiring Full Stack Engineer</text>
  </g>
  <!-- Tagline cursor -->
  <rect x="100" y="258" width="2" height="24" fill="#06b6d4" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="3s" fill="freeze"/>
    <animate attributeName="x" from="100" to="680" dur="2.5s" begin="3s" fill="freeze" calcMode="linear"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="5.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Tech badges (fade in after typing) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="6s" fill="freeze"/>
    <rect x="85" y="305" width="100" height="28" rx="14" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.5"/>
    <text x="135" y="324" font-family="monospace" font-size="11" fill="#61dafb" text-anchor="middle" opacity="0.8">React</text>
    <rect x="200" y="305" width="100" height="28" rx="14" fill="none" stroke="#3178c6" stroke-width="1" opacity="0.5"/>
