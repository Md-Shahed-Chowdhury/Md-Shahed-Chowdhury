    $ <tspan fill="#8888aa">whoami</tspan>
  </text>

  <!-- Name with typing animation -->
  <g clip-path="url(#nameClip)">
    <text x="85" y="235" font-family="'Fira Code','JetBrains Mono','Cascadia Code',monospace" font-size="28" fill="#e0e7ff" filter="url(#textGlow)">Md Shahed Chowdhury</text>
  </g>
  <!-- Name cursor -->
  <rect x="85" y="210" width="3" height="32" fill="#06b6d4" opacity="0">
