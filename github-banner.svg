<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#0d1133"/>
      <stop offset="70%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="glowOrb1" cx="20%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15">
        <animate attributeName="stop-opacity" values="0.15;0.08;0.15" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrb2" cx="80%" cy="40%" r="25%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12">
        <animate attributeName="stop-opacity" values="0.12;0.06;0.12" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrb3" cx="50%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08">
        <animate attributeName="stop-opacity" values="0.08;0.04;0.08" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="imgClip">
      <circle cx="1220" cy="250" r="175"/>
    </clipPath>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <clipPath id="nameClip">
      <rect x="85" y="205" width="0" height="45">
        <animate attributeName="width" from="0" to="580" dur="2s" begin="0.6s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="tagClip">
      <rect x="100" y="255" width="0" height="30">
        <animate attributeName="width" from="0" to="620" dur="2.5s" begin="3s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <rect width="1500" height="500" fill="url(#glowOrb1)"/>
  <rect width="1500" height="500" fill="url(#glowOrb2)"/>
  <rect width="1500" height="500" fill="url(#glowOrb3)"/>

  <!-- Circuit lines -->
  <g>
    <path d="M0,100 H200 L230,130 H400" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
    <path d="M0,100 H200 L230,130 H400" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3" filter="url(#glow1)">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <circle r="2" fill="#a855f7" opacity="0.8" filter="url(#glow1)">
      <animateMotion dur="4s" repeatCount="indefinite" path="M0,100 H200 L230,130 H400"/>
    </circle>
  </g>
  <g>
    <path d="M0,400 H150 L180,370 H350 L380,370 H500" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
    <path d="M0,400 H150 L180,370 H350 L380,370 H500" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3" filter="url(#glow1)">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.7s" repeatCount="indefinite"/>
    </path>
    <circle r="2" fill="#a855f7" opacity="0.8" filter="url(#glow1)">
      <animateMotion dur="5.2s" repeatCount="indefinite" path="M0,400 H150 L180,370 H350 L380,370 H500"/>
    </circle>
  </g>
  <g>
    <path d="M700,0 V80 L730,110 V200" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
    <path d="M700,0 V80 L730,110 V200" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3" filter="url(#glow1)">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4.4s" repeatCount="indefinite"/>
    </path>
    <circle r="2" fill="#a855f7" opacity="0.8" filter="url(#glow1)">
      <animateMotion dur="6.4s" repeatCount="indefinite" path="M700,0 V80 L730,110 V200"/>
    </circle>
  </g>
  <g>
    <path d="M1500,150 H1350 L1320,180 H1200" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
    <path d="M1500,150 H1350 L1320,180 H1200" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3" filter="url(#glow1)">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="5.1s" repeatCount="indefinite"/>
    </path>
    <circle r="2" fill="#a855f7" opacity="0.8" filter="url(#glow1)">
      <animateMotion dur="7.6s" repeatCount="indefinite" path="M1500,150 H1350 L1320,180 H1200"/>
    </circle>
  </g>
  <g>
    <path d="M1500,420 H1400 L1370,390 H1250" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
    <path d="M1500,420 H1400 L1370,390 H1250" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3" filter="url(#glow1)">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="5.8s" repeatCount="indefinite"/>
    </path>
    <circle r="2" fill="#a855f7" opacity="0.8" filter="url(#glow1)">
      <animateMotion dur="8.8s" repeatCount="indefinite" path="M1500,420 H1400 L1370,390 H1250"/>
    </circle>
  </g>
  <g>
    <path d="M400,500 V430 L430,400 V350" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
    <path d="M400,500 V430 L430,400 V350" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3" filter="url(#glow1)">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="6.5s" repeatCount="indefinite"/>
    </path>
    <circle r="2" fill="#a855f7" opacity="0.8" filter="url(#glow1)">
      <animateMotion dur="10s" repeatCount="indefinite" path="M400,500 V430 L430,400 V350"/>
    </circle>
  </g>

  <!-- Floating particles -->
  <circle cx="100" cy="50" r="1" fill="#6366f1" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/><animate attributeName="cy" values="50;35;50" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="157" cy="93" r="1.5" fill="#a855f7" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/><animate attributeName="cy" values="93;78;93" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="214" cy="136" r="1" fill="#06b6d4" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/><animate attributeName="cy" values="136;121;136" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="271" cy="179" r="1.5" fill="#6366f1" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite"/><animate attributeName="cy" values="179;164;179" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="328" cy="222" r="1" fill="#a855f7" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="7s" repeatCount="indefinite"/><animate attributeName="cy" values="222;207;222" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="385" cy="265" r="1.5" fill="#06b6d4" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/><animate attributeName="cy" values="265;250;265" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="442" cy="308" r="1" fill="#6366f1" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/><animate attributeName="cy" values="308;293;308" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="499" cy="351" r="1.5" fill="#a855f7" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/><animate attributeName="cy" values="351;336;351" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="556" cy="394" r="1" fill="#06b6d4" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite"/><animate attributeName="cy" values="394;379;394" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="613" cy="87" r="1.5" fill="#6366f1" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="7s" repeatCount="indefinite"/><animate attributeName="cy" values="87;72;87" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="670" cy="130" r="1" fill="#a855f7" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/><animate attributeName="cy" values="130;115;130" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="727" cy="173" r="1.5" fill="#06b6d4" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/><animate attributeName="cy" values="173;158;173" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="841" cy="259" r="1" fill="#6366f1" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite"/><animate attributeName="cy" values="259;244;259" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="898" cy="302" r="1.5" fill="#a855f7" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="7s" repeatCount="indefinite"/><animate attributeName="cy" values="302;287;302" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="955" cy="345" r="1" fill="#06b6d4" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/><animate attributeName="cy" values="345;330;345" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="1069" cy="81" r="1.5" fill="#6366f1" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/><animate attributeName="cy" values="81;66;81" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="1126" cy="124" r="1" fill="#a855f7" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite"/><animate attributeName="cy" values="124;109;124" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="1300" cy="253" r="1.5" fill="#6366f1" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/><animate attributeName="cy" values="253;238;253" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="1357" cy="396" r="1" fill="#a855f7" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/><animate attributeName="cy" values="396;381;396" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="1414" cy="89" r="1.5" fill="#06b6d4" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/><animate attributeName="cy" values="89;74;89" dur="7s" repeatCount="indefinite"/></circle>

  <!-- Code watermark -->
  <text x="50" y="480" font-family="monospace" font-size="10" fill="#6366f1" opacity="0.06">
    { } const dev = () =&gt; { return &lt;Code /&gt;; } // build.deploy.repeat
  </text>
  <text x="600" y="30" font-family="monospace" font-size="10" fill="#a855f7" opacity="0.06">
    import { passion } from 'developer'; export default function create() {}
  </text>

  <!-- Terminal window -->
  <rect x="60" y="120" width="680" height="280" rx="12" fill="#111127" stroke="#6366f1" stroke-width="1" opacity="0.6">
    <animate attributeName="stroke-opacity" values="0.6;0.3;0.6" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="60" y="120" width="680" height="36" rx="12" fill="#1a1a3e" opacity="0.8"/>
  <rect x="60" y="144" width="680" height="12" fill="#1a1a3e" opacity="0.8"/>
