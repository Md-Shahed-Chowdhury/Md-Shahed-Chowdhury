    <rect x="430" y="305" width="100" height="28" rx="14" fill="none" stroke="#68a063" stroke-width="1" opacity="0.5"/>
    <text x="480" y="324" font-family="monospace" font-size="11" fill="#68a063" text-anchor="middle" opacity="0.8">Node.js</text>
    <rect x="545" y="305" width="100" height="28" rx="14" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
    <text x="595" y="324" font-family="monospace" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.7">Next.js</text>
  </g>

  <!-- Right side - Profile with neon rings -->
  <circle cx="1220" cy="250" r="182" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.6" filter="url(#glowStrong)">
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" repeatCount="indefinite"/>
